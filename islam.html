<!DOCTYPE html>

<html>
<head>
<title>Custom Search Engine</title>
<link href="manifest.json" rel="manifest"/><link href="favicon.ico" rel="icon" type="image/x-icon"/></head>
<body>
<h1>Custom Search Engine</h1>
<div>
<input id="searchQuery" placeholder="Search..." type="text"/>
<button onclick="performSearch()">Search</button>
</div>
<div id="searchResults">
<!-- Search results will be displayed here -->
</div>
<script>
    function performSearch() {
      var searchQuery = document.getElementById('searchQuery').value;
      var cx = '31963fb4fa8a8465d'; // Replace with your CSE ID
      var apiKey = ''; // Replace with your API key
      var sites = [
        'darulifta-deoband.com',
        'almuftionline.com',
        'banuri.edu.pk',
        'darululoom-deoband.com',
        'onlinefatawa.com',
        'islamqa.info',
        'forum.mohaddis.com',
        'onlinedarulifta.com',
        'deobandi-books.aislam.org',
        'thefatwa.com',
        'dawateislami.net',
        'quran.com',
        'alim.org',
        'urdumehfil.net',
        'hadeethenc.com',
        'shamilaurdu.com',
        'shamela.ws',
        'sunnah.com',
        'ahadith.co.uk',
        'minhajbooks.com',
        'markaz.edu.pk',
        'kitabosunnat.com',
        'mohaddis.com',
        'urdufatwa.com',
        'al-hadees.com',
        'islamicurdubooks.com',
        'askimam.org',
        'daruliftaahlesunnat.net',
        'ahnafmedia.com',
        'nadwa.in'
      ];

      var query = "site:" + sites.join(" OR site:");

      var script = document.createElement('script');
      script.src = 'https://www.googleapis.com/customsearch/v1?callback=handleSearchResults&key=' + apiKey + '&cx=' + cx + '&q=' + searchQuery + ' ' + query;
      document.body.appendChild(script);
    }

    function handleSearchResults(response) {
      var searchResults = document.getElementById('searchResults');
      searchResults.innerHTML = '';

      if (response.items) {
        for (var i = 0; i < response.items.length; i++) {
          var item = response.items[i];
          var link = document.createElement('a');
          link.href = item.link;
          link.textContent = item.title;
          searchResults.appendChild(link);
          searchResults.appendChild(document.createElement('br'));
        }
      } else {
        searchResults.textContent = 'No results found.';
      }
    }
  </script>
<script type="module">
  import { Workbox } from 'https://storage.googleapis.com/workbox-cdn/releases/7.0.0/workbox-window.prod.mjs';

  const swUrl = './sw.js';
  const wb = new Workbox(swUrl);

  wb.addEventListener('waiting', () => {
    console.log('A new service worker is waiting to activate.');
    wb.messageSW({ type: 'SKIP_WAITING' });
  });

  wb.addEventListener('controlling', () => {
    console.log('The new service worker is now in control. Reloading page for updates...');
    window.location.reload();
  });

  wb.register();
</script></body>
</html>
