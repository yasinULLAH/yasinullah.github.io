<!DOCTYPE html>

<html>
<head>
<script src="jquery.js"></script>
<script src="jquery-ui.js"> </script>
<script>
   
   $(document).ready(function() {
     $("#show_hide").click(function () {
$( "#toggle_tst" ).toggle({
        duration: 200,
        specialEasing: {
          width: "easeOutElastic",
          height: "easeInBounce",
        },
        complete: function() {
        //  alert( "Animation complete!" );
        }
    });
  });  
  });
   </script>
<style>
#toggle_tst{
	padding: 8px;
    background:#2B5F8E;
	width: 250px;
    height:250px;
	box-shadow: 0 0 5px #aaa;
    font-size: 25px;
    color:#fff;
    text-align:center;
    border-radius: 150px;

}
button{
   margin: 30px 60px;
    
}
</style>
<link href="manifest.json" rel="manifest"/><link href="favicon.ico" rel="icon" type="image/x-icon"/></head>
<body>
<button id="show_hide">Show/Hide Circle</button>
<div id="toggle_tst">
     Toggle with specialEasing!
   </div>
<script type="module">
  import { Workbox } from 'https://storage.googleapis.com/workbox-cdn/releases/7.0.0/workbox-window.prod.mjs';

  const swUrl = './sw.js';
  const wb = new Workbox(swUrl);

  wb.addEventListener('waiting', () => {
    console.log('A new service worker is waiting to activate.');
    wb.messageSW({ type: 'SKIP_WAITING' });
  });

  wb.addEventListener('controlling', () => {
    console.log('The new service worker is now in control. Reloading page for updates...');
    window.location.reload();
  });

  wb.register();
</script></body>
</html>
