        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scrollbar-width: none; }
        html::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color-primary);
            font-family: var(--font-primary);
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;

        #matrix-canvas {

            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        #vignette {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: 0 0 200px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 100;
        }

        #terminal-wrapper {
            perspective: 1000px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--text-color-primary) transparent;
        }
        #terminal-wrapper::-webkit-scrollbar { width: 5px; }
        #terminal-wrapper::-webkit-scrollbar-track { background: transparent; }
        #terminal-wrapper::-webkit-scrollbar-thumb {
            background-color: var(--text-color-primary);
            box-shadow: 0 0 10px var(--glow-color-primary);
        }

        #terminal {
            max-width: 900px;
            margin: 5vh auto;
            padding: 10px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            transform: rotateX(calc((var(--mouse-y) - 50%) / -8)) rotateY(calc((var(--mouse-x) - 50%) / 12));
            text-shadow:
                0 0 2px #000,
                0 0 5px var(--glow-color-primary),
                0 0 10px var(--glow-color-primary);
        }
        
        #terminal::before { /* Holographic Sheen */
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.02) 40%, rgba(0, 255, 65, 0.1) 50%, rgba(255,255,255,0.02) 60%, rgba(255,255,255,0) 100%);
            background-size: 200% 200%;
            animation: sheen 10s linear infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes sheen { 0% { background-position: 200% 200%; } 100% { background-position: 0% 0%; } }

        .log-entry { display: none; }
        .prompt { color: var(--text-color-secondary); }
        .command { color: var(--text-color-primary); }

        .header-title {
            font-family: 'VT323', monospace;
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow:
                0 0 5px var(--glow-color-primary),
                0 0 15px var(--glow-color-primary),
                0 0 25px var(--glow-color-primary),
                0 0 40px var(--glow-color-secondary),
                -2px 2px 3px var(--accent-color);
            margin-bottom: 10px;
        }

        .header-title .char, #header-typed-tagline .char {
            display: inline-block;
            animation: text-pop-in 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes text-pop-in {
            0% { opacity: 0; transform: translateY(20px) scale(1.5) rotate(15deg); text-shadow: 0 0 50px var(--accent-color); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
        }

        #header-typed-tagline { font-size: 1.2rem; }
        
        .section-content, .timeline, .skills-grid, .data-table, .social-links a {
            animation: data-decode 0.5s ease-out;
        }
        @keyframes data-decode {
            from {
                opacity: 0;
                filter: blur(5px);
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }
        
        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s;

        a:hover {

            color: var(--accent-color);

        .skill-list li:hover { color: #fff; }

        .timeline-item {
            border: 1px solid transparent;
            border-image: linear-gradient(to right, transparent, var(--border-color), transparent) 1;
            padding: 15px; margin-bottom: 15px;
            transition: background 0.3s, border-color 0.3s;

        .timeline-item:hover {
            background: rgba(0, 255, 65, 0.05);

        #pakistan-flag {

        #pakistan-flag:hover {

        #audio-toggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 101;
            width: 50px; height: 50px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--text-color-primary);
            color: var(--text-color-primary);
            font-size: 1.2rem; cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #audio-toggle:hover {
            transform: scale(1.1);
            background: var(--text-color-primary);
            color: var(--bg-color);
            text-shadow: none;
            box-shadow: 0 0 20px var(--glow-color-primary);
        }
        
        .cursor {
            display: inline-block;
            background-color: var(--text-color-primary);
            box-shadow: 0 0 5px var(--glow-color-primary);
            animation: blink 1s step-end infinite;

        @keyframes blink { 50% { background-color: transparent; box-shadow: none; } }
        
        /* Preloader */
        #preloader {

            display: flex; justify-content: center; align-items: center;
        }
        #preloader-text { white-space: pre-wrap; font-size: 1.2rem; }
    </style>

                if (contentIndex < contentBlocks.length) {

                    const prompt = `\n<p><span class="prompt">[root@localhost ~]# </span><span class="command">${block.command}</span></p>`;
                    const entry = $('<div class="log-entry">').html(prompt + block.content);

                for (let i = 0; i < charIndex; i++) {

                    taglineEl.append(span);

                taglineEl.append('<span class="cursor">▋</span>');

                if (!isDeleting && charIndex < currentTagline.length) { charIndex++; }
                else if (isDeleting && charIndex > 0) { charIndex--; }
                else {
                    isDeleting = !isDeleting;
                    if (!isDeleting) { taglineIndex = (taglineIndex + 1) % taglines.length; }
                }
                setTimeout(typeTagline, isDeleting ? 40 : 100);
            }

            // --- Date Calculations ---
            function calcDate(d1, d2) {
                let years = d1.getFullYear() - d2.getFullYear();
                let months = d1.getMonth() - d2.getMonth();
                if (d1.getDate() < d2.getDate()) { months--; }
                if (months < 0) { years--; months += 12; }
                return (years > 0 ? `${years}y ` : '') + (months > 0 ? `${months}m` : '');
            }
            
            function updateDynamicDates() {
                const today = new Date('2025-06-12T11:12:27'); // User-provided timestamp
